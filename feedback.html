<!DOCTYPE html>
<html>
<head>
<title>Feedback Form</title>

<style>
body{
    font-family:Arial;
    background:#f2f2f2;
}

form{
COLOR:WHITE;
    width:350px;
    margin:50px auto;
    background:GREY;
    padding:20px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

input, textarea{
    width:95%;
    padding:10px;
    margin:8px 0;
}

button{
    width:100%;
    padding:10px;
    background:green;
    color:white;
    border:none;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:darkgreen;
}
</style>

</head>
<body>

<form onsubmit="return feedback()">

<h2 align="center">💬 Feedback Form</h2>

<input type="text" id="name" placeholder="Enter Name" required>

<input type="email" id="email" placeholder="Enter Email" required>

<textarea id="message" rows="5" placeholder="Write Feedback" required></textarea>

<button type="submit">Submit</button>

</form>

<script>

function feedback(){

    let name=document.getElementById("name").value;
    let email=document.getElementById("email").value;
    let message=document.getElementById("message").value;

    alert("Thank You " + name + "!\n\nYour Feedback Submitted Successfully.");

    console.log("Name:",name);
    console.log("Email:",email);
    console.log("Feedback:",message);

    return false; // Page Reload नहीं होगा
}

</script>

</body>
</html>
